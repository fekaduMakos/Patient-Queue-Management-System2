<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Display | Nigist Elin Hospital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .queue-display-main {
            background: white;
            border: 2px solid var(--primary-light);
            box-shadow: 0 40px 100px rgba(2, 132, 199, 0.05);
            text-align: center;
            padding: 5rem 2rem;
            border-radius: 40px;
            margin-bottom: 3rem;
            position: relative;
        }
        .current-token {
            font-size: 10rem;
            font-weight: 900;
            font-family: 'Outfit';
            color: var(--primary);
            margin: 1rem 0;
            line-height: 1;
        }
        .windows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .window-card {
            background: white;
            padding: 2.5rem;
            text-align: center;
            border-bottom: 6px solid var(--primary);
        }
        .now-serving-label {
            background: var(--secondary);
            color: white;
            padding: 8px 30px;
            border-radius: 50px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        footer.ticker-wrap {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-hospital"></i></div>
            <div class="hospital-name">
                <h1>NIGIST ELIN HOSPITAL</h1>
                <p>PATIENT QUEUE MANAGEMENT</p>
            </div>
        </div>
        <div id="liveClock" style="font-family: 'Outfit'; font-size: 1.5rem; font-weight: 800; color: var(--primary);">00:00:00</div>
    </header>

    <main class="container">
        <!-- GLOBAL STATUS -->
        <section class="queue-display-main" data-aos="zoom-in">
            <span class="now-serving-label">NOW SERVING / አሁን ተረኛ</span>
            <div class="current-token" id="mainToken">---</div>
            <div id="callMessage" style="font-size: 1.5rem; font-weight: 600; color: var(--text-muted);">WAITING FOR NEXT CALL</div>
        </section>

        <!-- WINDOWS STATUS -->
        <div class="windows-grid" id="windowsGrid">
            <!-- Dynamically loaded -->
        </div>
    </main>

    <footer class="ticker-wrap">
        <marquee behavior="scroll" direction="left" scrollamount="6">
            Nigist Elin Hospital: Dedicated to Excellence in Healthcare. | Please wait for your turn. | ንግሥተ ይህሊን ሆስፒታል፡ ለተሻለ የጤና አገልግሎት እንተጋለን። | እባክዎ ተራዎን በትዕግስት ይጠብቁ።
        </marquee>
    </footer>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('php/api/get_status.php');
                const data = await response.json();

                if (data.success) {
                    // Update Main Display
                    if (data.latest) {
                        const tokenEl = document.getElementById('mainToken');
                        const msgEl = document.getElementById('callMessage');
                        
                        if (tokenEl.innerText !== data.latest.token_number) {
                            tokenEl.innerText = data.latest.token_number;
                            msgEl.innerHTML = `PROCEED TO <span style="color:var(--primary)">WINDOW ${data.latest.window_number.toString().padStart(2, '0')}</span>`;
                            tokenEl.style.transform = 'scale(1.1)';
                            setTimeout(() => { tokenEl.style.transform = 'scale(1)'; }, 300);
                        }
                    }

                    // Update Grid
                    const grid = document.getElementById('windowsGrid');
                    grid.innerHTML = '';
                    data.windows.forEach(win => {
                        grid.innerHTML += `
                            <div class="glass-card window-card">
                                <h3 style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase;">${win.counter_name}</h3>
                                <div style="font-size: 3rem; font-weight: 800; color: var(--text-main); font-family: 'Outfit'; margin: 0.8rem 0;">${win.current_token || '---'}</div>
                                <p style="font-weight: 700; color: var(--primary);">WINDOW ${win.window_number.toString().padStart(2, '0')}</p>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                console.error("Fetch error:", error);
            }
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString();
        }

        setInterval(fetchStatus, 3000);
        setInterval(updateTime, 1000);
        fetchStatus();
        updateTime();
    </script>
</body>
</html>
