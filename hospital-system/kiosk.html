<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Kiosk | Nigist Elin Hospital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .premium-ticket {
            background: white;
            padding: 3rem;
            border-radius: 30px;
            width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 4px solid var(--primary);
        }
    </style>
</head>
<body>

    <div class="container" style="max-width: 1000px;">
        <div style="text-align: center; margin-bottom: 4rem;" data-aos="fade-up">
            <h1 style="font-family: 'Outfit'; font-size: 3.5rem; color: var(--text-main); margin-bottom: 0.5rem;">Welcome</h1>
            <p style="font-size: 1.4rem; color: var(--primary); font-weight: 600; letter-spacing: 4px; text-transform: uppercase;">Please select your service / አገልግሎት ይምረጡ</p>
        </div>

        <div class="kiosk-grid">
            <div class="kiosk-btn" onclick="printTicket('A', 'Registration / ምዝገባ', 'fa-user-plus')" data-aos="fade-up">
                <i class="fas fa-user-plus"></i>
                <div style="text-align: center;">
                    <h2 style="font-size: 1.8rem;">Registration</h2>
                    <span style="font-size: 1.1rem; color: var(--text-muted);">ምዝገባ</span>
                </div>
            </div>

            <div class="kiosk-btn" onclick="printTicket('C', 'Payment / ክፍያ', 'fa-cash-register')" data-aos="fade-up" style="animation-delay: 0.1s;">
                <i class="fas fa-cash-register"></i>
                <div style="text-align: center;">
                    <h2 style="font-size: 1.8rem;">Payment</h2>
                    <span style="font-size: 1.1rem; color: var(--text-muted);">ክፍያ</span>
                </div>
            </div>

            <div class="kiosk-btn" onclick="printTicket('B', 'Pharmacy / መድሃኒት ቤት', 'fa-pills')" data-aos="fade-up" style="animation-delay: 0.2s;">
                <i class="fas fa-pills"></i>
                <div style="text-align: center;">
                    <h2 style="font-size: 1.8rem;">Pharmacy</h2>
                    <span style="font-size: 1.1rem; color: var(--text-muted);">መድሃኒት ቤት</span>
                </div>
            </div>

            <div class="kiosk-btn" onclick="printTicket('L', 'Laboratory / ላቦራቶሪ', 'fa-microscope')" data-aos="fade-up" style="animation-delay: 0.3s;">
                <i class="fas fa-microscope"></i>
                <div style="text-align: center;">
                    <h2 style="font-size: 1.8rem;">Laboratory</h2>
                    <span style="font-size: 1.1rem; color: var(--text-muted);">ላቦራቶሪ</span>
                </div>
            </div>
        </div>
    </div>

    <!-- TICKET SUCCESS MODAL -->
    <div id="ticketModal" class="modal-overlay">
        <div class="premium-ticket">
            <div style="width: 80px; height: 80px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 2.5rem;">
                <i class="fas fa-check"></i>
            </div>
            <h2 id="deptTitle" style="font-family: 'Outfit'; font-size: 1.8rem; margin-bottom: 0.5rem;">Registration</h2>
            <p style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Your Turn Number</p>
            <h1 id="ticketNum" style="font-size: 6rem; font-weight: 900; color: var(--primary); margin: 0.5rem 0;">A-126</h1>
            <div style="border-top: 2px dashed #e2e8f0; margin: 2rem 0; padding-top: 1rem;">
                <p id="ticketTime" style="font-weight: 600; color: var(--text-muted);"></p>
            </div>
            <p style="font-weight: 700; color: var(--text-main); font-size: 1.1rem;">Please take your ticket and wait.<br>እባክዎ ትኬትዎን ይዘው ይጠብቁ።</p>
        </div>
    </div>

    <script>
        function printTicket(prefix, name, icon) {
            const num = Math.floor(Math.random() * 500) + 100;
            const fullToken = prefix + "-" + num;
            
            document.getElementById('deptTitle').innerHTML = `<i class="fas ${icon}" style="margin-right:10px; color:var(--primary)"></i> ${name}`;
            document.getElementById('ticketNum').textContent = fullToken;
            document.getElementById('ticketTime').textContent = new Date().toLocaleString();
            
            const modal = document.getElementById('ticketModal');
            modal.style.display = 'flex';
            
            // Auto close
            setTimeout(() => { modal.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
